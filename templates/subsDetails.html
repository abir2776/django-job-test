{% extends 'base.html' %}
{% block body_block %}
    <div class="container my-5">
        <div class="card">
            <div class="row">
                <aside class="col-sm-7">
                    <article class="card-body p-5">
                        <h3 class="title mp-3">{{subPlan.title}}</h3>
                        <p class="price-detail-wrap">
                            <span class="price h3 text-warning">
                                <span class="currency">BDT &#2547; </span><span class="num">{{subPlan.price}}</span>
                            </span>
                        </p>
                        <dl class="item-property">
                            <dt>Description</dt>
                            <dd>
                                <p>{{subPlan.detail_text|linebreaks}}</p>
                            </dd>
                        </dl>
                        <a href="{% url 'payment' id=subPlan.pk %}" class="btn btn-lg btn-outline-primary text-uppercase"></i>Buy Now</a>
                    </article>
                </aside>
            </div>
        </div>
    </div>

{% endblock %}
